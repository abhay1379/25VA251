<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loop in js</title>
</head>
<body>
    <script>
        let studentlist=["abhay","aashish","vishal","abhishek"];
        for(let i=0;i<studentlist.length;i++){
             console.log(studentlist[i]);
        }
        // while loop
        let i=0;
        while(i<studentlist.length){
             console.log(studentlist[i]);
             i++;
        }

        // for...of loop
        for(let x in studentlist){
             console.log(x);
        }
      // for.. in:
      // see example in object

    </script>
</body>
</html>
